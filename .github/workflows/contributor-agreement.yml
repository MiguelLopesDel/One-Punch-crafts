name: Contributor assignment

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify explicit acceptance
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const acceptance = new RegExp(
              '<!--\\s*CAA_ACCEPT\\s*-->\\s*\\r?\\n- \\[[xX]\\]'
            );

            if (!acceptance.test(body)) {
              core.setFailed(
                'The Contributor Assignment Agreement has not been accepted.'
              );
            }
