  <!-- form change: armor shell breaking around Boros' eye -->
  <g transform="translate(64 128)"><use href="#seal"/><path d="M15 14l17-6 17 7 5 20-9 18-13 5-14-6-8-17z" fill="#161016" stroke="#090707" stroke-width="2"/><path d="M32 9l-4 15 8 8-6 10 3 15M14 27l14-3M36 32l17-5M30 42l-12 10" fill="none" stroke="#e4bb61" stroke-width="2"/><path d="M22 31c7-6 14-6 21 0-7 8-14 8-21 0z" fill="#8c188b" stroke="#e5ca78" stroke-width="2"/><circle cx="32" cy="32" r="3" fill="#f5e7b3"/></g>

  <!-- meteoric burst: one-eyed comet body and explosive corona -->
  <g transform="translate(128 128)"><rect width="64" height="64" fill="url(#void)"/><circle cx="32" cy="32" r="28" fill="none" stroke="#e2b85e" stroke-width="3"/><path d="M31 8l4 13 9-10-4 14 14-3-12 8 13 7-15-2 5 14-10-11-4 17-3-17-12 11 7-15-15 3 13-9-12-7 15 3z" fill="#d774e1" stroke="#130a13" stroke-width="2"/><path d="M25 25c5-6 12-6 17 0-4 8-12 8-17 0z" fill="#100a12"/><ellipse cx="34" cy="25" rx="3" ry="2" fill="#f8e7aa"/></g>
</svg>
